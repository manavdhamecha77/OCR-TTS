<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image to Speech</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>

  <main>

    <div class="hero">
      <h1>Image to Speech</h1>
      <p>Upload an image or PDF, extract the text, and hear it read aloud.</p>
    </div>

    <div class="card">

      <div class="field">
        <label class="field-label">Language</label>
        <div class="lang-grid">
          <button class="lang-btn selected" data-lang="en" onclick="selectLang('en')">English</button>
          <button class="lang-btn" data-lang="hi" onclick="selectLang('hi')">हिंदी</button>
          <button class="lang-btn" data-lang="gu" onclick="selectLang('gu')">ગુજરાતી</button>
          <button class="lang-btn" data-lang="od" onclick="selectLang('od')">ଓଡ଼ିଆ</button>
        </div>
      </div>

      <div class="field">
        <label class="field-label">File</label>
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp,image/bmp,image/tiff,application/pdf" />
          <span class="dropzone-icon">↑</span>
          <p class="dropzone-text">Click to browse or drag &amp; drop</p>
          <p class="dropzone-sub">PNG, JPG, WEBP, BMP, TIFF, PDF</p>
        </div>

        <div class="preview" id="preview">
          <div class="preview-info">
            <span id="previewName"></span>
            <span id="previewSize" class="muted"></span>
          </div>
          <button class="remove-btn" onclick="removeFile()">✕</button>
        </div>
      </div>

      <div class="error" id="errorBox">
        <span id="errorMsg"></span>
      </div>

      <button class="btn-primary" id="processBtn" onclick="processFile()" disabled>
        Extract &amp; Speak
      </button>

    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span id="loaderMsg">Processing…</span>
    </div>

    <div class="results" id="results">

      <div class="card">
        <div class="result-header">
          <label class="field-label">Extracted Text</label>
          <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy</button>
        </div>
        <div class="ocr-text" id="ocrText"></div>
      </div>

      <div class="card audio-card">
        <label class="field-label">Audio</label>
        <audio id="audioPlayer" controls></audio>
        <a id="downloadLink" href="#" class="btn-secondary">Download</a>
      </div>

      <button class="reset-btn" onclick="resetAll()">← Start over</button>

    </div>

  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
